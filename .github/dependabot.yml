# Dependabot configuration for ButterGolf monorepo
# Since we use pnpm catalog for version management, updates should target the root
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# DESIGN DECISIONS:
# - Only 3 groups: platform-core (fragile), infra (moderate), everything-else (safe)
# - Platform-core is security-only — minor/patch bumps for Tamagui/Expo/RN/Solito
#   almost always break the build and require manual migration work
# - Catch-all group sweeps ungrouped deps into one PR instead of N individual ones
# - Max 3 PRs/month to keep noise manageable
# - All semver-major updates are ignored globally; major upgrades are handled manually

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      # ── Group 1: Platform-core (FRAGILE — security-only) ──────────────
      # Tamagui, Expo, React Native, Solito, React Navigation are deeply
      # intertwined. Even minor bumps regularly break builds.
      # applies-to limits this group to security patches only.
      platform-core:
        applies-to: security-updates
        patterns:
          - "tamagui"
          - "@tamagui/*"
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
          - "solito"
          - "@react-navigation/*"

      # ── Group 2: Infrastructure (one combined PR) ─────────────────────
      # Services and SDKs that need version alignment within their ecosystem
      # but are generally safe for minor/patch bumps.
      infrastructure:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "react"
          - "react-dom"
          - "react-is"
          - "@types/react"
          - "@types/react-dom"
          - "react-test-renderer"
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
          - "prisma"
          - "@prisma/*"
          - "stripe"
          - "@stripe/*"
          - "@clerk/*"
          - "svix"
          - "@sentry/*"

      # ── Group 3: Everything else (one combined PR) ────────────────────
      # Dev tools, utilities, media libs — low risk, batch together.
      everything-else:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

    ignore:
      # Block ALL major bumps across every package.
      # Major upgrades require manual migration work and testing.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

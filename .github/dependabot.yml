# Dependabot configuration for ButterGolf monorepo
# Since we use pnpm catalog for version management, updates should target the root
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root workspace dependencies (pnpm catalog)
  # CRITICAL: This is where the pnpm catalog lives - ALL versions are centralized here
  # Individual packages use "catalog:" references, so only root updates matter
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # CRITICAL: Group ALL Tamagui packages together
      # All @tamagui/* packages must be the same version
      tamagui:
        patterns:
          - "tamagui"
          - "@tamagui/*"
      # Group entire React ecosystem together
      # These are pinned via pnpm overrides and must match
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-native"
          - "react-native-*"
          - "@types/react"
          - "@types/react-dom"
          - "react-test-renderer"
          - "react-is"
      # Group Prisma together (client + CLI must match)
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      # Group Expo together (version-sensitive ecosystem)
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
      # Group Stripe together (API versions must be compatible)
      stripe:
        patterns:
          - "stripe"
          - "@stripe/*"
      # Group Clerk together (auth must be consistent)
      clerk:
        patterns:
          - "@clerk/*"
          - "svix"
      # Group Next.js together
      nextjs:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
      # Group Sentry together
      sentry:
        patterns:
          - "@sentry/*"
      # Group navigation (Solito + React Navigation)
      navigation:
        patterns:
          - "solito"
          - "@react-navigation/*"
      # Group build/dev tools
      dev-dependencies:
        patterns:
          - "prettier"
          - "turbo"
          - "typescript"
          - "tsx"
          - "eslint"
          - "eslint-*"
          - "@types/node"
      # Group carousel/media packages
      media:
        patterns:
          - "embla-carousel*"
          - "nuka-carousel"
          - "cloudinary"
          - "next-cloudinary"
      # Group utility packages
      utilities:
        patterns:
          - "date-fns"
          - "uuid"
          - "jose"
          - "ioredis"
          - "socket.io*"
    # CRITICAL: Ignore major version bumps for version-sensitive packages
    # These require manual testing and migration work
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tamagui"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tamagui/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@stripe/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

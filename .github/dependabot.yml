# Dependabot configuration for ButterGolf monorepo
# Since we use pnpm catalog for version management, updates should target the root
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# DESIGN DECISIONS:
# - Only 3 groups: platform-core (fragile), infra (moderate), everything-else (safe)
# - Platform-core is security-only — minor/patch bumps for Tamagui/Expo/RN/Solito
#   almost always break the build and require manual migration work
# - Catch-all group sweeps ungrouped deps into one PR instead of N individual ones
# - Max 3 PRs/month to keep noise manageable

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      # ── Group 1: Platform-core (FRAGILE — security-only) ──────────────
      # Tamagui, Expo, React Native, Solito, React Navigation are deeply
      # intertwined. Even minor bumps regularly break builds.
      # applies-to limits this group to security patches only.
      platform-core:
        applies-to: security-updates
        patterns:
          - "tamagui"
          - "@tamagui/*"
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
          - "solito"
          - "@react-navigation/*"

      # ── Group 2: Infrastructure (one combined PR) ─────────────────────
      # Services and SDKs that need version alignment within their ecosystem
      # but are generally safe for minor/patch bumps.
      infrastructure:
        patterns:
          - "react"
          - "react-dom"
          - "react-is"
          - "@types/react"
          - "@types/react-dom"
          - "react-test-renderer"
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
          - "prisma"
          - "@prisma/*"
          - "stripe"
          - "@stripe/*"
          - "@clerk/*"
          - "svix"
          - "@sentry/*"

      # ── Group 3: Everything else (one combined PR) ────────────────────
      # Dev tools, utilities, media libs — low risk, batch together.
      everything-else:
        patterns:
          - "*"

    ignore:
      # Block ALL major bumps for version-sensitive packages.
      # These require manual migration work and testing.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tamagui"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tamagui/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@stripe/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "solito"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-navigation/*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 2

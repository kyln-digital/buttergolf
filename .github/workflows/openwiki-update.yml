# OpenWiki scheduled refresh. Installed by Kyln Ops.
# Self-authored (not copied from an external repo). Runs the openwiki CLI
# non-interactively off env vars + the OPENROUTER_API_KEY secret, bootstraps
# the openwiki/ dir on first run, and opens a rolling review PR.
# One rolling PR per repo; no changes = no PR. Never auto-merges.
name: OpenWiki

on:
  schedule:
    - cron: "37 6 * * *" # ~daily 06:37 UTC, off the :00 mark
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: openwiki
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g openwiki
      - name: Refresh wiki
        env:
          OPENWIKI_PROVIDER: openrouter
          OPENWIKI_MODEL_ID: z-ai/glm-5.2
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: openwiki --update -p "Refresh the OpenWiki from recent changes."
      - name: Open rolling PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No wiki changes today."
            exit 0
          fi
          git checkout -B openwiki/update
          git add -A
          git commit -m "docs(openwiki): refresh repo wiki"
          git push --force-with-lease origin openwiki/update
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head openwiki/update \
            --title "docs(openwiki): refresh repo wiki" \
            --body "Scheduled OpenWiki refresh. Auto-generated by the OpenWiki action; review and merge. Merging keeps \`openwiki/\` on the default branch as the repo-local source of truth." \
            || echo "PR already open or could not be created."
